## CONFIG APP

spring:
  application:
    name: Orion

server:
  port: 9090

datasource:
  url: ${SPRING_DATASOURCE_URL}
  username: ${SPRING_DATASOURCE_USERNAME}
  password: ${SPRING_DATASOURCE_PASSWORD}
  driver-class-name: com.mysql.cj.jdbc.Driver


jpa:
  hibernate:
    ddl-auto: update

  show-sql: true

  properties:
    hibernate:
      format_sql: true
  database-platform: org.hibernate.dialect.MySQLDialect
