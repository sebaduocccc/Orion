  media-service:
    build: ./MediaService
    ports:
      - "9093:9093"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/media_db?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      MEDIA_STORAGE_LOCATION: /app/media_data
    volumes:
      - ./media_volumen:/app/media_data
