services:

#server eureka

  eurekaserver:
    build: ./backend/eurekaserver
    container_name: eurekaserver
    ports:
      - "${PORT_EUREKA}:${PORT_EUREKA}"
    networks:
      - orion-network


  apigateway:
    build: ./backend/apigateway
    container_name: apigateway
    ports:
      - "${PORT_GATEWAY}:${PORT_GATEWAY}"
    depends_on:
      eurekaserver:
        condition: service_started
    networks:
      - orion-network

# base de datos mysql
  db:
    image: mysql:8.0
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - ./init:/docker-entrypoint-initdb.d
      - orion_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost"]
      timeout: 20s
      retries: 10
    networks:
      - orion-network


#  microservicios


  user-service:
    build: ./backend/user-service
    container_name: user-service
    ports:
      - "${PORT_USER_SERVICE}:${PORT_USER_SERVICE}"
    depends_on:
      eurekaserver:
        condition: service_started
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${DB_NAME_USERS}?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_ROOT_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_DEFAULT_ZONE}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - orion-network


volumes:
  orion_db_data:


networks:
  orion-network:
    driver: bridge