spring:
  application:
    name: SuscripcionService
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://db:3306/feed_db?allowPublicKeyRetrieval=true&useSSL=false}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

server:
  port: 9102

