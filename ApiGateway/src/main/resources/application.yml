server:
  port: 8000

spring:
  application:
    name: ApiGateway

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]': ## aplica a todas las rutas
                allowed-origins:
                  - "http://localhost:5173" ## el puerto de la app react
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTION # React
                  - PATCH
                allowed-headers: "*"
                allow-credentials: true


          routes:
            - id: usuario-service
              uri: http://user-service:9090
              predicates:
                - Path=/api/usuarios/**
                - Path=/api/auth/**

            - id: post-service
              uri: http://post-service:9091
              predicates:
                - Path=/api/posts/**

            - id: media-service
              uri: http://media-service:9093
              predicates:
                - Path=/api/media/**